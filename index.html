<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Plataforma de entrenamiento personal de Aitor Dorronsoro. Acceso exclusivo para clientes: rutinas personalizadas, calendario de sesiones, control de progreso y facturación de servicios.">
    <meta name="author" content="Aitor Dorronsoro">
    <title>Aitor Dorronsoro | Plataforma de Entrenamiento Personal</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Local CSS Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 1. FULL-SCREEN LOGIN CONTAINER -->
    <div id="login-container" class="login-wrapper">
        <!-- Generado dinámicamente por app.js -->
    </div>

    <!-- 2. MAIN APPLICATION CONTAINER (SIDEBAR + CONTENT WRAPPER) -->
    <div id="app-container" style="display: none;">
        <!-- Generado dinámicamente por app.js dependiente del rol de usuario (Admin/Cliente) -->
    </div>

    <!-- 3. TOAST FLOATING NOTIFICATIONS CONTAINER -->
    <div id="toast-container"></div>

    <!-- External Libraries (CDNs) -->
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Main Application JavaScript -->
    <script src="quotes.js"></script>
    <script src="app.js"></script>
</body>
</html>
